<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Mana Nizamabad Pasupu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo-area">
<img src="picsart 1.png" alt="Logo">
<span>Mana Nizamabad Pasupu</span>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="index.html#products">Products</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div style="height:90px;"></div>

<section style="max-width:500px;margin:auto;padding:40px;text-align:center;">

<h2 style="margin-bottom:25px;">Login to Continue</h2>

<p style="margin-bottom:30px;">
Please login with your Google account to continue shopping.
</p>

<button onclick="loginWithGoogle()" style="
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:#000;
color:#fff;
border:none;
padding:14px 25px;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin:auto;
">

<i class="fab fa-google"></i>
Login with Google

</button>

</section>

<footer class="footer">
<div class="footer-bottom">
© 2026 Mana Nizamabad Pasupu. All rights reserved.
</div>
</footer>

<script type="module">

import { auth } from "./firebase.js";

import {
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const provider = new GoogleAuthProvider();

/* GOOGLE LOGIN */

window.loginWithGoogle = () => {

signInWithPopup(auth, provider)

.then((result) => {

alert("Welcome " + result.user.displayName);

window.location.href = "cart.html";

})

.catch((error) => {

alert(error.message);

});

};

/* AUTO REDIRECT IF ALREADY LOGGED IN */

onAuthStateChanged(auth, (user) => {

if (user) {
window.location.href = "cart.html";
}

});

</script>

</body>
</html>
