<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Mana Nizamabad Pasupu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>
body{ background:#f6f6f6; font-family:Poppins; }

.steps{
    background:#2f63d6;
    color:#fff;
    padding:18px 40px;
    font-weight:600;
    margin-top:90px;
}

.checkout-wrapper{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:40px;
    padding:40px 60px 60px;
}

.checkout-box{
    background:#fff;
    padding:30px;
    border-radius:12px;
}

.checkout-box input,
.checkout-box select,
.checkout-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

.order-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.order-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.order-left img{
    width:50px;
    height:50px;
    object-fit:contain;
}

.qty-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.qty-box button{
    width:28px;
    height:28px;
    border:none;
    background:#ffb703;
    border-radius:50%;
    cursor:pointer;
    font-weight:700;
}

.total-row{
    display:flex;
    justify-content:space-between;
    font-weight:600;
    margin-top:10px;
}

.place-btn{
    width:100%;
    padding:14px;
    background:#d18b00;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:20px;
    cursor:pointer;
    font-weight:600;
}

/* PROFILE */
.profile-box{
    position:relative;
    cursor:pointer;
}

.profile-dropdown{
    position:absolute;
    right:0;
    top:40px;
    background:#fff;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    border-radius:8px;
    padding:15px;
    width:220px;
    display:none;
    z-index:1000;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
<div class="logo-area">
<img src="picsart 1.png">
<span>Mana Nizamabad Pasupu</span>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="index.html#products">Products</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>
</nav>

<div class="profile-box" onclick="toggleProfile()">
<i class="fas fa-user-circle" style="font-size:22px;"></i>
<div class="profile-dropdown" id="profileMenu">
<p><strong id="userName">Guest</strong></p>
<p id="userEmail"></p>
<hr>
<button onclick="logoutUser()">Logout</button>
</div>
</div>
</header>

<div class="steps">
SHOPPING CART → <strong>CHECKOUT</strong> → ORDER COMPLETE
</div>

<div class="checkout-wrapper">

<!-- BILLING -->
<div class="checkout-box">
<h2>Billing Details</h2>

<label>First Name <span style="color:red">*</span></label>
<input id="firstName" required>

<label>Last Name <span style="color:red">*</span></label>
<input id="lastName" required>

<label>Street Address <span style="color:red">*</span></label>
<input id="address" required>

<label>Town / City <span style="color:red">*</span></label>
<input id="city" required>

<label>State <span style="color:red">*</span></label>
<select id="state" required>
<option value="">Select State</option>
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>
<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
</select>

<label>PIN Code <span style="color:red">*</span></label>
<input id="pincode" required>

<label>Phone <span style="color:red">*</span></label>
<input id="phone" required>

<label>Email <span style="color:red">*</span></label>
<input id="email" type="email" required>

<label>Order Notes</label>
<textarea id="notes"></textarea>

</div>

<!-- ORDER SUMMARY -->
<div class="checkout-box">
<h2>Your Order</h2>
<div id="orderItems"></div>

<hr>

<div class="total-row">
<span>Subtotal</span>
<span id="subTotal">₹0</span>
</div>

<div class="total-row">
<span>Shipping</span>
<span id="shippingAmount">₹0</span>
</div>

<div class="total-row">
<span>Total</span>
<span id="grandTotal">₹0</span>
</div>

<button class="place-btn" onclick="placeOrder()">Place Order</button>
</div>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let cart = JSON.parse(localStorage.getItem("cart")) || {};

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}else{
document.getElementById("userName").innerText =
user.displayName || "User";
document.getElementById("userEmail").innerText =
user.email || user.phoneNumber;
document.getElementById("email").value =
user.email || "";
}
});

window.toggleProfile=function(){
const menu=document.getElementById("profileMenu");
menu.style.display=
menu.style.display==="block"?"none":"block";
};

window.logoutUser=function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
};

function calculateShipping(totalQty){
if(totalQty<=1) return 70;
return 70+(totalQty-1)*40;
}

function renderCheckout(){
const orderBox=document.getElementById("orderItems");
let subtotal=0;
let totalQty=0;
orderBox.innerHTML="";

Object.values(cart).forEach(item=>{
subtotal+=item.price*item.qty;
totalQty+=item.qty;

orderBox.innerHTML+=`
<div class="order-item">
<div class="order-left">
<img src="${item.image}">
<div>
<div>${item.name}</div>
<div class="qty-box">
<button onclick="updateQty('${item.name}',-1)">−</button>
<span>${item.qty}</span>
<button onclick="updateQty('${item.name}',1)">+</button>
</div>
</div>
</div>
<div>₹${item.price*item.qty}</div>
</div>`;
});

let shipping=calculateShipping(totalQty);

document.getElementById("subTotal").innerText="₹"+subtotal;
document.getElementById("shippingAmount").innerText="₹"+shipping;
document.getElementById("grandTotal").innerText="₹"+(subtotal+shipping);
}

window.updateQty=function(name,change){
if(!cart[name]) return;
cart[name].qty+=change;
if(cart[name].qty<=0) delete cart[name];
localStorage.setItem("cart",JSON.stringify(cart));
renderCheckout();
};

window.placeOrder=function(){

const requiredFields=[
"firstName","lastName","address",
"city","state","pincode",
"phone","email"
];

for(let id of requiredFields){
if(!document.getElementById(id).value.trim()){
alert("Please fill all required fields");
return;
}
}

if(Object.keys(cart).length===0){
alert("Cart is empty");
return;
}

alert("Order Placed Successfully 🎉");
localStorage.removeItem("cart");
window.location.href="index.html";
};

renderCheckout();
</script>

</body>
</html>
