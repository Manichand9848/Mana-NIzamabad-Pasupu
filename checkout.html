<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Mana Nizamabad Pasupu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>

body{background:#f6f6f6;font-family:Poppins;}

.steps{
background:#2f63d6;
color:#fff;
padding:18px 40px;
font-weight:600;
margin-top:90px;
}

.checkout-wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
padding:40px 60px 60px;
}

.checkout-box{
background:#fff;
padding:30px;
border-radius:12px;
}

.checkout-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

.order-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-left{
display:flex;
align-items:center;
gap:10px;
}

.order-left img{
width:50px;
height:50px;
object-fit:contain;
}

.total-row{
display:flex;
justify-content:space-between;
font-weight:600;
margin-top:10px;
}

.place-btn{
width:100%;
padding:14px;
background:#d18b00;
color:#fff;
border:none;
border-radius:8px;
margin-top:20px;
cursor:pointer;
font-weight:600;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo-area">
<img src="picsart 1.png">
<span>Mana Nizamabad Pasupu</span>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="index.html#products">Products</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<div class="steps">
SHOPPING CART → <strong>CHECKOUT</strong> → ORDER COMPLETE
</div>


<div class="checkout-wrapper">

<div class="checkout-box">

<h2>Billing Details</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

</div>


<div class="checkout-box">

<h2>Your Order</h2>

<div id="orderItems"></div>

<hr>

<div class="total-row">
<span>Subtotal</span>
<span id="subTotal">₹0</span>
</div>

<div class="total-row">
<span>Shipping</span>
<span id="shippingAmount">₹0</span>
</div>

<div class="total-row">
<span>Total</span>
<span id="grandTotal">₹0</span>
</div>

<button class="place-btn" onclick="placeOrder()">Pay Now</button>

</div>

</div>


<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<script type="module">

import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let cart = JSON.parse(localStorage.getItem("cart")) || {};

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
}
else{
document.getElementById("email").value = user.email || "";
}

});


function calculateShipping(totalQty){

if(totalQty<=1) return 70;
return 70+(totalQty-1)*40;

}


function renderCheckout(){

const orderBox=document.getElementById("orderItems");

let subtotal=0;
let totalQty=0;

orderBox.innerHTML="";

Object.values(cart).forEach(item=>{

subtotal+=item.price*item.qty;
totalQty+=item.qty;

orderBox.innerHTML+=`

<div class="order-item">

<div class="order-left">

<img src="${item.image}">

<div>

<div>${item.name}</div>
<div>Qty : ${item.qty}</div>

</div>

</div>

<div>₹${item.price*item.qty}</div>

</div>

`;

});

let shipping=calculateShipping(totalQty);

document.getElementById("subTotal").innerText="₹"+subtotal;
document.getElementById("shippingAmount").innerText="₹"+shipping;
document.getElementById("grandTotal").innerText="₹"+(subtotal+shipping);

}


window.placeOrder = async function(){

/* CHECK CART */

if(Object.keys(cart).length === 0){
alert("Cart is empty");
return;
}

/* CHECK FORM */

const name = document.getElementById("firstName").value.trim();
const email = document.getElementById("email").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();

if(!name || !phone || !address){
alert("Please fill all required details");
return;
}


/* CALCULATE TOTAL */

let total = 0;

Object.values(cart).forEach(item=>{
total += item.price * item.qty;
});


/* STORE ORDER FOR SUCCESS PAGE */

let orderData = {

name:name,
email:email,
phone:phone,
address:address,
products:Object.values(cart),
total:total

};

localStorage.setItem("lastOrder",JSON.stringify(orderData));


try{

/* CREATE CASHFREE ORDER */

const response = await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
amount: total,
name:name,
email:email,
phone:phone
})

});

const data = await response.json();

if(!data.payment_session_id){

alert("Payment session error");
return;

}

/* OPEN CASHFREE PAYMENT */

const cashfree = Cashfree({
mode:"production"
});

cashfree.checkout({

paymentSessionId:data.payment_session_id,
redirectTarget:"_self",
redirect:true

});


}catch(error){

console.error(error);
alert("Payment initialization failed");

}

};


/* RENDER CART */

renderCheckout();

</script>

</body>
</html>
